<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>XAUUSD Backtest</title>
<script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
<style>
body{background:#0e0e0e;color:white;font-family:Arial;margin:0;text-align:center;}
#chart{width:100%;height:600px;margin:auto;}
.panel{margin:15px;}
</style>
</head>
<body>

<h2>XAUUSD Backtest</h2>
<div id="chart"></div>
<div class="panel">
<button onclick="start()">Start</button>
<button onclick="pause()">Pause</button>
<button onclick="buy()">Buy</button>
<button onclick="sell()">Sell</button>
Speed
<input type="range" id="speed" min="50" max="1000" value="300">
</div>
<h3 id="profit">Profit: 0</h3>
<script src="script.js"></script>
</body>
</html>
